name: CD - Deploy to Production

# Workflow này DISABLED mặc định - chỉ deploy khi manually trigger
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOCKER_IMAGE_NAME: agrilink-api

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore AgriLink_DH.sln
      
      - name: Build for production
        run: dotnet build AgriLink_DH.sln --configuration Release --no-restore
      
      - name: Publish API
        run: dotnet publish AgriLink_DH.Api/AgriLink_DH.Api.csproj --configuration Release --output ./publish --no-build
      
      # ==========================================
      # Option 1: Deploy to Docker Registry
      # ==========================================
      # Uncomment và setup DOCKER_USERNAME, DOCKER_PASSWORD trong GitHub secrets
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
