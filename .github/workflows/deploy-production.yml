      # ==========================================
      # Uncomment và setup AZURE_WEBAPP_PUBLISH_PROFILE trong GitHub secrets
      # - name: Deploy to Azure Web App
      #   uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: 'your-app-name'
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      #     package: ./publish
      
      # ==========================================
