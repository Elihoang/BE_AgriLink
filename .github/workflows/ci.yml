name: CI/CD Pipeline - AgriLink Backend

on:
  push:
    branches: 
      - '**'           # Chạy trên tất cả các branch
      - '!docs/**'     # Trừ các branch bắt đầu bằng docs/
      - '!backup/**'   # Trừ các branch bắt đầu bằng backup/
  pull_request:
    branches: 
      - main
      - develop
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CACHE_VERSION: 'v1'

jobs:
  # ==========================================
  # Job 1: Code Quality & Security Analysis
  # ==========================================
  code-quality:
    name: Code Quality & Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.CACHE_VERSION }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.CACHE_VERSION }}-
      
      - name: Restore dependencies
        run: dotnet restore AgriLink_DH.sln
      
      - name: Security audit
        run: |
          echo "### Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          dotnet list AgriLink_DH.sln package --vulnerable --include-transitive 2>&1 | tee security-scan.log || echo "No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          if grep -q "has the following vulnerable packages" security-scan.log; then
            echo "::warning::Vulnerable packages detected!"
          fi
        continue-on-error: true
      
      - name: Check code formatting
        run: dotnet format AgriLink_DH.sln --verify-no-changes --verbosity diagnostic
        continue-on-error: true
      
      - name: Check for outdated packages
        run: |
          echo "### Outdated NuGet Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          dotnet list AgriLink_DH.sln package --outdated || echo "All packages up to date!" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

  # ==========================================
  # Job 2: Build & Test
  # ==========================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15
    
    strategy:
      matrix:
        include:
          - dotnet-version: '9.0.x'
            is-primary: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.CACHE_VERSION }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.CACHE_VERSION }}-
      
      - name: Restore dependencies
        run: dotnet restore AgriLink_DH.sln
      
      - name: Build for Production
        run: dotnet build AgriLink_DH.sln --configuration Release --no-restore
      
      - name: Publish API
        if: matrix.is-primary
        run: dotnet publish AgriLink_DH.Api/AgriLink_DH.Api.csproj --configuration Release --output ./publish --no-build
      
      - name: Upload build artifacts
        if: matrix.is-primary
        uses: actions/upload-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: ./publish
          retention-days: 30
          compression-level: 9
      
      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **.NET Version**: ${{ matrix.dotnet-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Success" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Job 3: Database Migration Check
  # ==========================================
  migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore AgriLink_DH.sln
      
      - name: Check for pending migrations
        run: |
          echo "### Database Migration Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # List all migrations
          echo "#### Available Migrations" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la AgriLink_DH.Api/Migrations/ || echo "No migrations found" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Job 4: Success Summary
  # ==========================================
  success:
    name: Pipeline Success
    runs-on: ubuntu-latest
    needs: [code-quality, build, migration-check]
    if: always()
    
    steps:
      - name: All checks passed
        run: |
          echo "### CI Pipeline Completed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Build: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Migration Check: Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ready for review/merge**" >> $GITHUB_STEP_SUMMARY
